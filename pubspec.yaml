name: smart_constat
description: Mobile-first automotive inspection app foundation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.9.0
  intl: ^0.20.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: 6.3.0
  firebase_storage: ^13.3.0
  shared_preferences: ^2.2.2
  # OCR & Camera
  google_mlkit_text_recognition: ^0.11.0
  google_mlkit_entity_extraction: ^0.11.0
  image_picker: ^1.0.7
  camera: ^0.10.5+5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/